<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quiz</title>

<style>
body {
  font-family: Arial;
  background: #001f3f;
  color: white;
  text-align: center;
}

.option {
  background: #003566;
  margin: 10px;
  padding: 15px;
  cursor: pointer;
}

.correct { background: green; }
.wrong { background: red; }

#leaderboard {
  position: fixed;
  right: 10px;
  top: 50px;
  width: 200px;
  background: #000;
  padding: 10px;
}
.team-active { background: gold; color: black; }
</style>

</head>

<body>

<h1 id="title">Quiz</h1>

<div id="setup">
  <input id="teamCount" type="number" placeholder="Teams (2-8)">
  <button onclick="startQuiz()">Start</button>
</div>

<div id="category"></div>

<div id="quiz" style="display:none;">
  <h2 id="question"></h2>
  <div id="options"></div>
  <button onclick="nextQ()">Next</button>
</div>

<div id="leaderboard"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxHG21J8gJpgW5oZCni5qF_0paH1I66nPBujJGzx03s3dF45VTnnDYyotzYzBlDcT0/exec";

let questions = [];
let grouped = {};
let state = {};

function startQuiz() {

  let n = parseInt(document.getElementById("teamCount").value);
  if (!n || n < 2) return alert("Enter team count");

  state = {
    teams: [],
    scores: {},
    type: null,
    qIndex: 0,
    teamIndex: 0
  };

  for (let i = 0; i < n; i++) {
    let name = prompt("Team " + (i+1));
    state.teams.push(name || ("Team " + (i+1)));
    state.scores[state.teams[i]] = 0;
  }

  loadQuestions();
}

/* JSONP LOAD (NO FETCH) */
function loadQuestions() {

  let script = document.createElement("script");
  script.src = API_URL + "?callback=handleData";

  document.body.appendChild(script);
}

/* CALLBACK */
function handleData(data) {

  questions = data;

  grouped = {};
  questions.forEach(q => {
    if (!grouped[q.Type]) grouped[q.Type] = [];
    grouped[q.Type].push(q);
  });

  showCategories();
}

function showCategories() {

  let div = document.getElementById("category");
  div.innerHTML = "<h3>Select Category</h3>";

  Object.keys(grouped).forEach(t => {
    let b = document.createElement("button");
    b.innerText = t;
    b.onclick = () => startType(t);
    div.appendChild(b);
  });
}

function startType(t) {
  state.type = t;
  state.qIndex = 0;

  document.getElementById("category").innerHTML = "";
  document.getElementById("quiz").style.display = "block";

  loadQ();
}

function loadQ() {

  let q = grouped[state.type][state.qIndex];
  document.getElementById("question").innerText = q.Question;

  let optDiv = document.getElementById("options");
  optDiv.innerHTML = "";

  ["A","B","C","D"].forEach(l => {
    let d = document.createElement("div");
    d.className = "option";
    d.innerText = q["Option " + l];
    d.onclick = () => answer(l,d);
    optDiv.appendChild(d);
  });

  updateBoard();
}

function answer(ans, el) {

  let q = grouped[state.type][state.qIndex];

  if (ans === q["Correct Answer"]) {
    el.classList.add("correct");
    let team = state.teams[state.teamIndex];
    state.scores[team] += 1;
  } else {
    el.classList.add("wrong");
  }

  updateBoard();
}

function nextQ() {

  state.qIndex++;
  state.teamIndex = (state.teamIndex + 1) % state.teams.length;

  if (state.qIndex >= grouped[state.type].length) {
    alert("Category finished");
    location.reload();
    return;
  }

  loadQ();
}

function updateBoard() {

  let div = document.getElementById("leaderboard");
  div.innerHTML = "<h3>Scores</h3>";

  state.teams.forEach((t,i) => {
    let d = document.createElement("div");
    d.innerText = t + ": " + state.scores[t];

    if (i === state.teamIndex) d.className = "team-active";

    div.appendChild(d);
  });
}

</script>

</body>
</html>
